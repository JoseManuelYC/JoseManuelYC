<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="José Yáñez — Backend Developer and AI Integration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00131f"/>
      <stop offset="1" stop-color="#001b2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#20df66" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#20df66" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#20df66" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8affc0"/>
      <stop offset="1" stop-color="#20df66"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#20df66"/>
      <stop offset="1" stop-color="#0e8f43"/>
    </linearGradient>
    <style>
      .name  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .mono  { font-family: 'SF Mono', 'Consolas', 'Liberation Mono', monospace; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1200" height="360" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="359" rx="20" fill="none" stroke="#20df66" stroke-opacity="0.18"/>

  <!-- faint dotted grid -->
  <g fill="#20df66" fill-opacity="0.05">
    <!-- generated dot matrix, lower-left region for depth -->
    <circle cx="60"  cy="300" r="1.6"/><circle cx="110" cy="300" r="1.6"/><circle cx="160" cy="300" r="1.6"/><circle cx="210" cy="300" r="1.6"/><circle cx="260" cy="300" r="1.6"/><circle cx="310" cy="300" r="1.6"/><circle cx="360" cy="300" r="1.6"/><circle cx="410" cy="300" r="1.6"/>
    <circle cx="60"  cy="330" r="1.6"/><circle cx="110" cy="330" r="1.6"/><circle cx="160" cy="330" r="1.6"/><circle cx="210" cy="330" r="1.6"/><circle cx="260" cy="330" r="1.6"/><circle cx="310" cy="330" r="1.6"/><circle cx="360" cy="330" r="1.6"/><circle cx="410" cy="330" r="1.6"/>
  </g>

  <!-- ambient glow behind the sphere -->
  <circle cx="245" cy="180" r="185" fill="url(#glow)"/>

  <!-- ===== rotating wireframe globe ===== -->
  <g transform="translate(245 180)">
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0 -6; 0 6; 0 -6" dur="7s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>

    <!-- outer orbit, slowly rotating dashes -->
    <g stroke="#20df66" stroke-opacity="0.35" fill="none">
      <circle r="152" stroke-dasharray="2 15" stroke-width="1.4">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="rotate(-8)">
      <!-- silhouette -->
      <circle r="118" fill="none" stroke="#20df66" stroke-opacity="0.85" stroke-width="1.6"/>

      <!-- latitudes (static, tilted) -->
      <g fill="none" stroke="#20df66" stroke-opacity="0.30" stroke-width="1.2">
        <ellipse cx="0" cy="0"   rx="118" ry="34"/>
        <ellipse cx="0" cy="-24" rx="99"  ry="26"/>
        <ellipse cx="0" cy="24"  rx="99"  ry="26"/>
        <ellipse cx="0" cy="-50" rx="70"  ry="17"/>
        <ellipse cx="0" cy="50"  rx="70"  ry="17"/>
      </g>

      <!-- meridians (animated rx = rotation) -->
      <g fill="none" stroke="#26e06e" stroke-opacity="0.55" stroke-width="1.3">
        <ellipse rx="118" ry="118">
          <animate attributeName="rx" values="118;83;0;83;118;83;0;83;118" keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1" dur="8s" repeatCount="indefinite" begin="0s"/>
        </ellipse>
        <ellipse rx="118" ry="118">
          <animate attributeName="rx" values="118;83;0;83;118;83;0;83;118" keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1" dur="8s" repeatCount="indefinite" begin="-1.33s"/>
        </ellipse>
        <ellipse rx="118" ry="118">
          <animate attributeName="rx" values="118;83;0;83;118;83;0;83;118" keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1" dur="8s" repeatCount="indefinite" begin="-2.67s"/>
        </ellipse>
        <ellipse rx="118" ry="118">
          <animate attributeName="rx" values="118;83;0;83;118;83;0;83;118" keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1" dur="8s" repeatCount="indefinite" begin="-4s"/>
        </ellipse>
        <ellipse rx="118" ry="118">
          <animate attributeName="rx" values="118;83;0;83;118;83;0;83;118" keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1" dur="8s" repeatCount="indefinite" begin="-5.33s"/>
        </ellipse>
        <ellipse rx="118" ry="118">
          <animate attributeName="rx" values="118;83;0;83;118;83;0;83;118" keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1" dur="8s" repeatCount="indefinite" begin="-6.67s"/>
        </ellipse>
      </g>

      <!-- glowing core -->
      <circle r="6" fill="url(#core)">
        <animate attributeName="r" values="5;7.5;5" dur="3.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- orbiting particles -->
    <circle r="4" fill="#8affc0">
      <animateMotion dur="6s" repeatCount="indefinite"
        path="M -175 0 a 175 55 0 1 0 350 0 a 175 55 0 1 0 -350 0"/>
    </circle>
    <circle r="3" fill="#20df66">
      <animateMotion dur="9s" repeatCount="indefinite" begin="-3s"
        path="M 150 0 a 150 48 30 1 1 -300 0 a 150 48 30 1 1 300 0"/>
    </circle>
  </g>

  <!-- ===== identity ===== -->
  <text class="mono" x="470" y="96" font-size="15" letter-spacing="3" fill="#20df66" fill-opacity="0.85">// BACKEND · AI · AUTOMATION</text>

  <text class="name" x="468" y="176" font-size="66" font-weight="700" letter-spacing="1.5" fill="#eaf3ee">José Yáñez</text>

  <!-- animated underline -->
  <rect x="472" y="196" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="0;250;250" keyTimes="0;0.6;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0.5;1" keyTimes="0;0.6;0.8;1" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <text class="name" x="470" y="248" font-size="25" font-weight="500" letter-spacing="0.5" fill="#26e06e">
    Backend Developer<tspan fill="#3f6172">  ·  </tspan><tspan fill="#a9c2ce">AI Integration</tspan>
  </text>

  <text class="mono" x="472" y="290" font-size="15" letter-spacing="0.5" fill="#6f8b98">typescript<tspan fill="#2a6b45">  ·  </tspan>nestjs<tspan fill="#2a6b45">  ·  </tspan>aws<tspan fill="#2a6b45">  ·  </tspan>langchain<tspan fill="#2a6b45">  ·  </tspan>n8n</text>
</svg>
